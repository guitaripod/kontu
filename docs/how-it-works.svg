<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#5f7155"/></marker>
  </defs>
  <rect width="1000" height="700" fill="#10130f"/>

  <text x="500" y="50" text-anchor="middle" fill="#efe7d2" font-size="30" font-weight="700">Miten kontu toimii</text>
  <text x="500" y="80" text-anchor="middle" fill="#9aa394" font-size="16">Suomen rantakohteet  →  automaattinen laatuseula  →  vain parhaat</text>

  <!-- PIPELINE ROW -->
  <rect x="48" y="118" width="188" height="92" rx="14" fill="#191e16" stroke="#2b3327" stroke-width="1.5"/>
  <text x="142" y="156" text-anchor="middle" fill="#e9ece3" font-size="16.5" font-weight="600">Asuntoportaalit</text>
  <text x="142" y="180" text-anchor="middle" fill="#9aa394" font-size="13.5">Oikotie · Etuovi</text>

  <line x1="236" y1="164" x2="280" y2="164" stroke="#5f7155" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="286" y="118" width="208" height="92" rx="14" fill="#191e16" stroke="#2b3327" stroke-width="1.5"/>
  <text x="390" y="150" text-anchor="middle" fill="#e9ece3" font-size="16.5" font-weight="600">Pull &amp; rikastus</text>
  <text x="390" y="172" text-anchor="middle" fill="#9aa394" font-size="13">haku sinun IP:stä,</text>
  <text x="390" y="190" text-anchor="middle" fill="#9aa394" font-size="13">kentät detaljisivuilta</text>

  <line x1="494" y1="164" x2="538" y2="164" stroke="#5f7155" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="544" y="110" width="190" height="108" rx="14" fill="#15251b" stroke="#3fae6f" stroke-width="2"/>
  <text x="639" y="150" text-anchor="middle" fill="#7fe0a6" font-size="17" font-weight="700">LAATUSEULA</text>
  <text x="639" y="174" text-anchor="middle" fill="#cfe6d6" font-size="12.5">9 pakollista kriteeriä</text>
  <text x="639" y="194" text-anchor="middle" fill="#9aa394" font-size="12">kaikkien täytyttävä</text>

  <line x1="734" y1="164" x2="778" y2="164" stroke="#5f7155" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="784" y="118" width="168" height="92" rx="14" fill="#191e16" stroke="#2b3327" stroke-width="1.5"/>
  <text x="868" y="156" text-anchor="middle" fill="#efe7d2" font-size="16.5" font-weight="700">Validoitu</text>
  <text x="868" y="178" text-anchor="middle" fill="#9aa394" font-size="13.5">lista</text>

  <!-- criteria panel (what the seula checks) -->
  <line x1="639" y1="218" x2="639" y2="270" stroke="#3a6b4d" stroke-width="2" stroke-dasharray="4 4"/>
  <rect x="48" y="272" width="600" height="222" rx="16" fill="#171c14" stroke="#2b3327" stroke-width="1.5"/>
  <text x="74" y="304" fill="#7fe0a6" font-size="13" font-weight="700" letter-spacing="0.6">PAKOLLISET KRITEERIT</text>

  <text x="74" y="340" fill="#dbe1d2" font-size="14.5">●  Yksitasoinen</text>
  <text x="74" y="372" fill="#dbe1d2" font-size="14.5">●  Oma järvenranta (ei lampi/joki/meri)</text>
  <text x="74" y="404" fill="#dbe1d2" font-size="14.5">●  Kuntoluokka hyvä tai parempi</text>
  <text x="74" y="436" fill="#dbe1d2" font-size="14.5">●  Matala ostajan riski (≤ 25/100)</text>
  <text x="74" y="468" fill="#dbe1d2" font-size="14.5">●  Ympärivuotinen (talviasuttava)</text>

  <text x="384" y="340" fill="#dbe1d2" font-size="14.5">●  Oma tontti</text>
  <text x="384" y="372" fill="#dbe1d2" font-size="14.5">●  Toimiva infra: vesi, viemäri, tie</text>
  <text x="384" y="404" fill="#dbe1d2" font-size="14.5">●  Enintään 100 000 €</text>
  <text x="384" y="436" fill="#dbe1d2" font-size="14.5">●  Käteiskaupan hinta</text>
  <text x="384" y="468" fill="#9aa394" font-size="13">Plussaa: valokuitu · EV-lataus · rauha</text>

  <!-- cost/risk models box -->
  <rect x="700" y="272" width="252" height="222" rx="16" fill="#191e16" stroke="#2b3327" stroke-width="1.5"/>
  <text x="826" y="304" text-anchor="middle" fill="#e9ece3" font-size="14.5" font-weight="600">Kustannus- &amp; riskimallit</text>
  <text x="826" y="328" text-anchor="middle" fill="#9aa394" font-size="12.5">paikallinen &amp; deterministinen</text>
  <text x="826" y="372" text-anchor="middle" fill="#cfe6d6" font-size="12.5">€/kk asumiskulut · 20 v NPV</text>
  <text x="826" y="396" text-anchor="middle" fill="#cfe6d6" font-size="12.5">ostajan riski 0–100</text>
  <text x="826" y="420" text-anchor="middle" fill="#cfe6d6" font-size="12.5">lykätty korjausvelka €</text>
  <text x="826" y="462" text-anchor="middle" fill="#9aa394" font-size="12">syöttää riskipisteet seulaan ↑</text>

  <!-- outputs -->
  <line x1="868" y1="210" x2="868" y2="556" stroke="#5f7155" stroke-width="2"/>
  <line x1="868" y1="556" x2="320" y2="556" stroke="#5f7155" stroke-width="2"/>
  <line x1="320" y1="556" x2="320" y2="588" stroke="#5f7155" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="660" y1="556" x2="660" y2="588" stroke="#5f7155" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="170" y="594" width="300" height="86" rx="14" fill="#191e16" stroke="#2b3327" stroke-width="1.5"/>
  <text x="320" y="626" text-anchor="middle" fill="#efe7d2" font-size="16" font-weight="600">Julkinen verkkosivu</text>
  <text x="320" y="650" text-anchor="middle" fill="#9aa394" font-size="13">koti-lista + kohdesivut, jaa linkillä</text>

  <rect x="510" y="594" width="300" height="86" rx="14" fill="#191e16" stroke="#2b3327" stroke-width="1.5"/>
  <text x="660" y="626" text-anchor="middle" fill="#efe7d2" font-size="16" font-weight="600">Telegram-hälytys</text>
  <text x="660" y="650" text-anchor="middle" fill="#9aa394" font-size="13">kuvakortti + linkki suoraan kohteeseen</text>
</svg>
