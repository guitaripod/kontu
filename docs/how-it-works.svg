<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#5f7155"/></marker>
  </defs>
  <rect width="1000" height="700" fill="#10130f"/>

  <text x="500" y="50" text-anchor="middle" fill="#efe7d2" font-size="30" font-weight="700">How kontu works</text>
  <text x="500" y="80" text-anchor="middle" fill="#9aa394" font-size="16">Finnish waterfront listings  →  automatic quality gate  →  only the best</text>

  <!-- PIPELINE ROW -->
  <rect x="48" y="118" width="188" height="92" rx="14" fill="#191e16" stroke="#2b3327" stroke-width="1.5"/>
  <text x="142" y="156" text-anchor="middle" fill="#e9ece3" font-size="16.5" font-weight="600">Listing portals</text>
  <text x="142" y="180" text-anchor="middle" fill="#9aa394" font-size="13.5">Oikotie · Etuovi</text>

  <line x1="236" y1="164" x2="280" y2="164" stroke="#5f7155" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="286" y="118" width="208" height="92" rx="14" fill="#191e16" stroke="#2b3327" stroke-width="1.5"/>
  <text x="390" y="150" text-anchor="middle" fill="#e9ece3" font-size="16.5" font-weight="600">Pull &amp; enrich</text>
  <text x="390" y="172" text-anchor="middle" fill="#9aa394" font-size="13">fetched from your IP,</text>
  <text x="390" y="190" text-anchor="middle" fill="#9aa394" font-size="13">fields from detail pages</text>

  <line x1="494" y1="164" x2="538" y2="164" stroke="#5f7155" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="544" y="110" width="190" height="108" rx="14" fill="#15251b" stroke="#3fae6f" stroke-width="2"/>
  <text x="639" y="150" text-anchor="middle" fill="#7fe0a6" font-size="17" font-weight="700">QUALITY GATE</text>
  <text x="639" y="174" text-anchor="middle" fill="#cfe6d6" font-size="12.5">9 required criteria</text>
  <text x="639" y="194" text-anchor="middle" fill="#9aa394" font-size="12">all must pass</text>

  <line x1="734" y1="164" x2="778" y2="164" stroke="#5f7155" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="784" y="118" width="168" height="92" rx="14" fill="#191e16" stroke="#2b3327" stroke-width="1.5"/>
  <text x="868" y="156" text-anchor="middle" fill="#efe7d2" font-size="16.5" font-weight="700">Validated</text>
  <text x="868" y="178" text-anchor="middle" fill="#9aa394" font-size="13.5">list</text>

  <!-- criteria panel (what the gate checks) -->
  <line x1="639" y1="218" x2="639" y2="270" stroke="#3a6b4d" stroke-width="2" stroke-dasharray="4 4"/>
  <rect x="48" y="272" width="600" height="222" rx="16" fill="#171c14" stroke="#2b3327" stroke-width="1.5"/>
  <text x="74" y="304" fill="#7fe0a6" font-size="13" font-weight="700" letter-spacing="0.6">REQUIRED CRITERIA</text>

  <text x="74" y="340" fill="#dbe1d2" font-size="14.5">●  Single-storey</text>
  <text x="74" y="372" fill="#dbe1d2" font-size="14.5">●  Own lake shore (no pond/river/sea)</text>
  <text x="74" y="404" fill="#dbe1d2" font-size="14.5">●  Condition: good or better</text>
  <text x="74" y="436" fill="#dbe1d2" font-size="14.5">●  Low buyer-risk (≤ 25/100)</text>
  <text x="74" y="468" fill="#dbe1d2" font-size="14.5">●  Year-round (winterised)</text>

  <text x="384" y="340" fill="#dbe1d2" font-size="14.5">●  Owned plot</text>
  <text x="384" y="372" fill="#dbe1d2" font-size="14.5">●  Working infra: water/sewer/road</text>
  <text x="384" y="404" fill="#dbe1d2" font-size="14.5">●  At most €100,000</text>
  <text x="384" y="436" fill="#dbe1d2" font-size="14.5">●  Cash-purchase price</text>
  <text x="384" y="468" fill="#9aa394" font-size="13">Plus: fibre · EV charging · privacy</text>

  <!-- cost/risk models box -->
  <rect x="700" y="272" width="252" height="222" rx="16" fill="#191e16" stroke="#2b3327" stroke-width="1.5"/>
  <text x="826" y="304" text-anchor="middle" fill="#e9ece3" font-size="14.5" font-weight="600">Cost &amp; risk models</text>
  <text x="826" y="328" text-anchor="middle" fill="#9aa394" font-size="12.5">local &amp; deterministic</text>
  <text x="826" y="372" text-anchor="middle" fill="#cfe6d6" font-size="12.5">€/mo running cost · 20-yr NPV</text>
  <text x="826" y="396" text-anchor="middle" fill="#cfe6d6" font-size="12.5">buyer-risk 0–100</text>
  <text x="826" y="420" text-anchor="middle" fill="#cfe6d6" font-size="12.5">deferred capex €</text>
  <text x="826" y="462" text-anchor="middle" fill="#9aa394" font-size="12">feeds risk score into the gate ↑</text>

  <!-- outputs: route down the right margin, clear of the models box -->
  <path d="M868 210 V230 H974 V556 H320 V588" fill="none" stroke="#5f7155" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="660" y1="556" x2="660" y2="588" stroke="#5f7155" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="170" y="594" width="300" height="86" rx="14" fill="#191e16" stroke="#2b3327" stroke-width="1.5"/>
  <text x="320" y="626" text-anchor="middle" fill="#efe7d2" font-size="16" font-weight="600">Public website</text>
  <text x="320" y="650" text-anchor="middle" fill="#9aa394" font-size="13">list + per-house pages, share by link</text>

  <rect x="510" y="594" width="300" height="86" rx="14" fill="#191e16" stroke="#2b3327" stroke-width="1.5"/>
  <text x="660" y="626" text-anchor="middle" fill="#efe7d2" font-size="16" font-weight="600">Telegram alert</text>
  <text x="660" y="650" text-anchor="middle" fill="#9aa394" font-size="13">photo card + link straight to the house</text>
</svg>
